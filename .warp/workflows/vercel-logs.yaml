---
name: UJverse — Vercel logs (follow)
command: npx vercel logs --follow {{deployment_or_url}}
tags:
  - ujverse
  - vercel
description: |
  Stream logów z produkcyjnego deploymentu Vercel. Podaj URL lub ID deploymentu,
  np. `ujverse.pl` albo konkretny `dpl_xxx`.
arguments:
  - name: deployment_or_url
    description: URL lub ID deploymentu (np. ujverse.pl)
    default_value: ujverse.pl
